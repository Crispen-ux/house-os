services:
  # ============================================================
  # House OS API Server
  # ============================================================
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: houseos-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://houseos_user:${DB_PASSWORD}@cretek-postgres:5432/houseos
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      APP_URL: ${APP_URL:-http://localhost:3000}
      API_URL: ${API_URL:-http://localhost:4000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@houseos.app}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    ports:
      - "${API_PORT:-4000}:4000"
    networks:
      - houseos
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ============================================================
  # House OS Web (Next.js)
  # ============================================================
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
    container_name: houseos-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks:
      - houseos
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

networks:
  houseos:
    name: houseos
    driver: bridge
